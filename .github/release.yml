changelog:
  exclude:
    labels:
      - "skip-changelog"
  categories:
    - title: "🆕 新機能"
      labels:
        - "feat"
    - title: "🐛 バグ修正"
      labels:
        - "fix"
    - title: "🔧 改善"
      labels:
        - "refactor"
        - "perf"
    - title: "🏗️ メンテナンス"
      labels:
        - "chore"
        - "ci"
        - "deps"
    - title: "📝 ドキュメント"
      labels:
        - "docs"
    - title: "その他の変更"
      labels:
        - "*"
