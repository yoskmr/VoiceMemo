# .github/workflows/staging.yml
# ステージング環境向けワークフロー
# staging ブランチへの push 時に Ad Hoc IPA をビルドし、
# Firebase App Distribution にアップロードしてテスターに配布する
name: Staging

on:
  push:
    branches: [staging]

# 同時実行制御: 新しいプッシュで実行中のビルドをキャンセル
concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  # ==============================
  # Job: iOS Ad Hoc ビルド → Firebase App Distribution
  # ==============================
  ios-staging:
    name: iOS Staging
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      # --- 証明書・Provisioning Profile の復元 ---
      - name: Install certificates and provisioning profile
        env:
          CERTIFICATES_P12_BASE64: ${{ secrets.CERTIFICATES_P12_BASE64 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          PROVISIONING_PROFILE_STAGING_ADHOC_BASE64: ${{ secrets.PROVISIONING_PROFILE_STAGING_ADHOC_BASE64 }}
        run: |
          # 一時 Keychain を作成
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # p12 証明書をインポート
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATES_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATES_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Provisioning Profile を配置
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_STAGING_ADHOC_BASE64" | base64 --decode -o "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      # --- App Store Connect API Key の配置 ---
      - name: Install App Store Connect API Key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      # --- ビルド ---
      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project repository/ios/Soyoka.xcodeproj \
            -scheme Soyoka

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project repository/ios/Soyoka.xcodeproj \
            -scheme Soyoka \
            -archivePath $RUNNER_TEMP/Soyoka.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="app.soyoka.ios.staging"

          ls -la $RUNNER_TEMP/Soyoka.xcarchive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Soyoka.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist repository/ios/ExportOptions-AdHoc.plist

      # --- Firebase App Distribution へアップロード ---
      - name: Decode Firebase service account
        run: |
          echo -n "${{ secrets.FIREBASE_STAGING_SERVICE_ACCOUNT_JSON_BASE64 }}" \
            | base64 --decode -o $RUNNER_TEMP/firebase-sa.json

      - name: Get release notes from last commit
        id: release-notes
        run: |
          NOTES=$(git log -1 --pretty=format:'%s')
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          firebase appdistribution:distribute \
            $RUNNER_TEMP/export/Soyoka.ipa \
            --app "${{ secrets.FIREBASE_STAGING_APP_ID }}" \
            --groups "developers" \
            --release-notes "${{ steps.release-notes.outputs.notes }}"

      # --- クリーンアップ ---
      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f $RUNNER_TEMP/firebase-sa.json
          rm -rf ~/.private_keys
