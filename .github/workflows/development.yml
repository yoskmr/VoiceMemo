# .github/workflows/development.yml
# 開発環境向けワークフロー
# development ブランチへの push 時に Backend を dev 環境にデプロイする
name: Development

on:
  push:
    branches: [development]

# 同時実行制御: 新しいプッシュで実行中のデプロイをキャンセル
concurrency:
  group: development
  cancel-in-progress: true

jobs:
  # ==============================
  # Job: Backend 開発環境デプロイ
  # ==============================
  backend-dev:
    name: Backend Dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: repository/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: repository/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Deploy to Cloudflare Workers (dev)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --env dev
