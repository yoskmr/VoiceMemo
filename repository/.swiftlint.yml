# SwiftLint Configuration for MurMurNote
# https://github.com/realm/SwiftLint

included:
  - VoiceMemoApp
  - VoiceMemoModules/Sources

excluded:
  - VoiceMemoModules/.build
  - "**/.build"
  - "**/DerivedData"

# Disabled Rules
disabled_rules:
  - trailing_whitespace
  - todo

# Opt-in Rules
opt_in_rules:
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rule Configurations
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

file_length:
  warning: 500
  error: 1000

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - n

nesting:
  type_level: 3
  function_level: 3

function_parameter_count:
  warning: 6
  error: 8

large_tuple:
  warning: 3
  error: 4

# Custom Rules
custom_rules:
  feature_infra_dependency:
    name: "Feature-Infra Direct Dependency"
    regex: "import Infra(STT|LLM|Storage|Network)"
    match_kinds:
      - identifier
    message: "Feature modules must not directly depend on Infra modules. Use Domain layer protocols instead."
    severity: error
    included: "Sources/Feature.*\\.swift"
