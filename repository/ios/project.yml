name: Soyoka
options:
  bundleIdPrefix: app.soyoka
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

packages:
  SoyokaModules:
    path: SoyokaModules

targets:
  Soyoka:
    type: application
    platform: iOS
    sources:
      - path: SoyokaApp
        type: group
    dependencies:
      - package: SoyokaModules
        product: FeatureRecording
      - package: SoyokaModules
        product: FeatureMemo
      - package: SoyokaModules
        product: FeatureAI
      - package: SoyokaModules
        product: FeatureSearch
      - package: SoyokaModules
        product: FeatureSettings
      - package: SoyokaModules
        product: FeatureSubscription
      - package: SoyokaModules
        product: Domain
      - package: SoyokaModules
        product: Data
      - package: SoyokaModules
        product: SharedUI
      - package: SoyokaModules
        product: SharedUtil
      - package: SoyokaModules
        product: InfraSTT
      - package: SoyokaModules
        product: InfraLLM
      - package: SoyokaModules
        product: InfraStorage
      - package: SoyokaModules
        product: InfraNetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.soyoka
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SoyokaApp/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
    info:
      path: SoyokaApp/Info.plist
      properties:
        CFBundleDisplayName: Soyoka
        NSMicrophoneUsageDescription: "音声メモの録音に使用します"
        NSSpeechRecognitionUsageDescription: "音声をテキストに変換するために使用します"
        UILaunchScreen: {}
        CFBundleDocumentTypes:
          - CFBundleTypeName: Soyoka Backup
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - app.soyoka.backup
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.data
              - public.archive
            UTTypeDescription: Soyoka Backup
            UTTypeIdentifier: app.soyoka.backup
            UTTypeTagSpecification:
              public.filename-extension:
                - soyokabackup

  SoyokaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoyokaModules/Tests
        type: group
    dependencies:
      - target: Soyoka
      - package: SoyokaModules
        product: Domain
      - package: SoyokaModules
        product: FeatureRecording
      - package: SoyokaModules
        product: FeatureMemo
      - package: SoyokaModules
        product: FeatureSearch
      - package: SoyokaModules
        product: FeatureSettings
      - package: SoyokaModules
        product: InfraSTT
      - package: SoyokaModules
        product: InfraLLM
      - package: SoyokaModules
        product: InfraStorage
